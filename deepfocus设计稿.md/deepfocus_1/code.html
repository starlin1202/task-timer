<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>首页 (编辑核心任务弹窗 - 修正版)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F26522",
                        "primary-light": "#FFF3E0",
                        "primary-dark": "#D84315",
                        "background-light": "#FAFAFA",
                        "background-dark": "#121212",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1E1E1E",
                        "text-main-light": "#333333",
                        "text-main-dark": "#E0E0E0",
                        "text-sub-light": "#666666",
                        "text-sub-dark": "#A0A0A0",
                        "border-light": "#E5E5E5",
                        "border-dark": "#333333",
                        danger: "#EF4444",
                    },
                    fontFamily: {
                        sans: ["'Noto Sans SC'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'nav': '0 -2px 10px rgba(0,0,0,0.03)',
                        'orange-glow': '0 10px 25px -5px rgba(242, 101, 34, 0.15), 0 8px 10px -6px rgba(242, 101, 34, 0.1)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            display: inline-block;
            vertical-align: middle;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark transition-colors duration-200 flex flex-col relative pb-32 overflow-hidden">
<header class="pt-6 pb-4 px-4 flex justify-center items-center relative bg-surface-light dark:bg-surface-dark sticky top-0 z-10">
<h1 class="text-xl font-medium tracking-wide text-text-main-light dark:text-text-main-dark">深度聚焦</h1>
</header>
<section class="px-4 mb-8 mt-4">
<h3 class="text-lg font-bold mb-3 text-text-main-light dark:text-text-main-dark">核心任务</h3>
<button class="w-full aspect-[16/9] bg-white dark:bg-surface-dark border-2 border-dashed border-primary/40 dark:border-primary/30 rounded-3xl flex flex-col items-center justify-center p-6 transition-all group shadow-sm">
<div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-soft mb-3 group-hover:shadow-orange-glow transition-shadow">
<span class="material-icons-round text-white text-4xl">add</span>
</div>
<span class="text-lg font-bold text-primary mb-1">点击添加核心任务</span>
<span class="text-sm text-text-sub-light dark:text-text-sub-dark font-light">设定一个聚焦目标，见证自我成长</span>
</button>
</section>
<section class="px-4 flex-1">
<div class="flex justify-between items-center mb-4">
<h3 class="text-lg font-bold text-text-main-light dark:text-text-main-dark">其他任务</h3>
<button class="w-9 h-9 rounded-full bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
<span class="material-icons-round text-gray-600 dark:text-gray-300 text-xl">add</span>
</button>
</div>
<div class="grid grid-cols-3 gap-2.5 pb-6">
<div class="bg-surface-light dark:bg-surface-dark border border-gray-100 dark:border-gray-800 rounded-xl flex flex-col shadow-sm p-2 text-center">
<div class="flex flex-col items-center mb-2">
<div class="w-8 h-8 rounded-lg bg-purple-50 dark:bg-purple-900/20 flex items-center justify-center text-purple-500 mb-1">
<span class="material-icons-round text-lg">sports_esports</span>
</div>
<span class="text-[12px] font-bold text-gray-800 dark:text-gray-100 truncate w-full px-1">玩游戏</span>
</div>
<button class="w-full py-1.5 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center space-x-0.5">
<span class="material-icons-round text-gray-600 dark:text-gray-300 text-[14px]">play_arrow</span>
<span class="text-[11px] font-bold text-gray-600 dark:text-gray-300">开始</span>
</button>
</div>
</div>
</section>
<nav class="fixed bottom-0 left-0 right-0 bg-surface-light dark:bg-surface-dark border-t border-gray-100 dark:border-gray-800 shadow-nav z-10">
<div class="flex justify-around items-center h-16 max-w-lg mx-auto">
<button class="flex flex-col items-center justify-center w-full h-full text-primary">
<span class="material-icons-round text-2xl">playlist_add_check</span>
<span class="text-[10px] mt-1 font-medium">任务</span>
</button>
<button class="flex flex-col items-center justify-center w-full h-full text-text-sub-light dark:text-text-sub-dark">
<span class="material-icons-round text-2xl">pie_chart</span>
<span class="text-[10px] mt-1 font-medium">统计</span>
</button>
</div>
<div class="h-6 bg-surface-light dark:bg-surface-dark"></div>
</nav>
<div class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center px-4 backdrop-blur-[2px]">
<div class="bg-white dark:bg-surface-dark w-full max-w-sm rounded-[24px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
<div class="px-6 pt-7 pb-4 flex justify-center">
<h2 class="text-xl font-bold text-text-main-light dark:text-text-main-dark">编辑核心任务</h2>
</div>
<div class="px-6 space-y-5 pb-6">
<div>
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark mb-1.5 uppercase tracking-wider">任务名称</label>
<input class="w-full px-4 py-3.5 rounded-xl border-border-light dark:border-border-dark bg-gray-50 dark:bg-gray-800/50 text-text-main-light dark:text-text-main-dark focus:ring-primary/30 focus:border-primary transition-all text-base placeholder:text-gray-300" placeholder="如：学习 Python" type="text" value="学习python"/>
</div>
<div class="grid grid-cols-2 gap-3">
<div>
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark mb-1.5 uppercase tracking-wider">任务天数</label>
<div class="flex items-center bg-gray-50 dark:bg-gray-800/50 rounded-xl border border-border-light dark:border-border-dark overflow-hidden h-11">
<button class="w-10 h-full flex items-center justify-center text-primary active:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-xl font-bold">remove</span>
</button>
<div class="flex-1 flex items-center justify-center min-w-0">
<input class="w-full bg-transparent border-none text-center text-base font-bold text-text-main-light dark:text-text-main-dark focus:ring-0 p-0" type="number" value="21"/>
</div>
<button class="w-10 h-full flex items-center justify-center text-primary active:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-xl font-bold">add</span>
</button>
</div>
</div>
<div>
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark mb-1.5 uppercase tracking-wider">每天计划 (h)</label>
<div class="flex items-center bg-gray-50 dark:bg-gray-800/50 rounded-xl border border-border-light dark:border-border-dark overflow-hidden h-11">
<button class="w-10 h-full flex items-center justify-center text-primary active:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-xl font-bold">remove</span>
</button>
<div class="flex-1 flex items-center justify-center min-w-0">
<input class="w-full bg-transparent border-none text-center text-base font-bold text-text-main-light dark:text-text-main-dark focus:ring-0 p-0" type="number" value="2"/>
</div>
<button class="w-10 h-full flex items-center justify-center text-primary active:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-xl font-bold">add</span>
</button>
</div>
</div>
</div>
<div class="pt-2">
<p class="text-primary font-bold text-base text-center bg-primary-light/50 dark:bg-primary/10 py-2.5 rounded-xl border border-primary/10">
                    总投入时长：<span class="text-lg">42</span> 小时
                </p>
</div>
</div>
<div class="px-6 py-4 bg-gray-50/80 dark:bg-gray-800/30 flex items-center justify-between border-t border-border-light/50 dark:border-border-dark/50">
<button class="text-sm font-semibold text-danger hover:text-red-600 transition-colors py-2 px-1">
                删除
            </button>
<button class="bg-primary hover:bg-primary-dark text-white text-sm font-bold px-8 py-3 rounded-xl shadow-soft transition-all active:scale-95">
                确认
            </button>
</div>
</div>
</div>
